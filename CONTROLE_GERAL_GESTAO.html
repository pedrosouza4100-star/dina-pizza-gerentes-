<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dina Pizza - Dashboard Geral</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F1F5F9;color:#1E293B}
.hdr{background:#1E2761;padding:.8rem 1.2rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.logo-c{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.25);flex-shrink:0;background:#000}
.logo-c img{width:100%;height:100%;object-fit:cover}
.hdr-info{flex:1}.hdr-t{font-size:15px;font-weight:600;color:#fff}.hdr-s{font-size:11px;color:#93C5FD;margin-top:2px}
.badge-m{background:#10B981;color:#fff;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.app{max-width:1100px;margin:0 auto;padding:.8rem .8rem 3rem}
.top-bar{display:flex;align-items:center;gap:8px;margin-bottom:.8rem}
.ts{font-size:11px;color:#94A3B8;flex:1}
.refresh{background:#07689F;color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:500}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:7px;margin-bottom:.9rem}
.kpi{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:.65rem .8rem}
.kpi-v{font-size:19px;font-weight:700}.kpi-l{font-size:10px;color:#64748B;margin-top:2px}
.sec-div{font-size:13px;font-weight:700;color:#1E2761;margin:1.2rem 0 .6rem;padding-bottom:.4rem;border-bottom:2px solid #1E2761}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:.8rem}
.filter-row h3{font-size:13px;font-weight:600;color:#475569;flex:1}
.mf{padding:5px 11px;border-radius:7px;border:1px solid #CBD5E1;background:#fff;cursor:pointer;font-size:11px;font-weight:500;color:#64748B}
.mf.active{background:#1E2761;color:#fff;border-color:#1E2761}
.rank-wrap{background:#fff;border:1px solid #E2E8F0;border-radius:10px;overflow:auto;margin-bottom:1rem}
.rank-wrap table{width:100%;border-collapse:collapse;font-size:11px;min-width:900px}
.rank-wrap th{background:#1E2761;color:#fff;padding:7px 7px;text-align:center;font-size:10px;font-weight:600;white-space:nowrap}
.rank-wrap th:nth-child(2){text-align:left}
.rank-wrap td{padding:7px 7px;border-bottom:1px solid #F1F5F9;text-align:center;vertical-align:middle;white-space:nowrap}
.rank-wrap td:nth-child(2){text-align:left;font-weight:600}
.rank-wrap tr:last-child td{border-bottom:none}
.rank-wrap tr:hover td{background:#F8FAFC}
.rank-wrap tr.top1 td{background:#FFFBEB}
.rank-wrap tr.top2 td{background:#F8FAFC}
.rank-wrap tr.top3 td{background:#FFF7F0}
.badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700}
.b1{background:#FFD700;color:#7A5F00}.b2{background:#C0C0C0;color:#333}.b3{background:#CD7F32;color:#fff}.bn{background:#F1F5F9;color:#64748B}
.nota-g{color:#4285F4;font-weight:700}.nota-i{color:#EA1D2C;font-weight:700}.nota-l{color:#F97316;font-weight:700}
.good{color:#16a34a;font-weight:600}.warn{color:#d97706;font-weight:600}.bad{color:#dc2626;font-weight:600}
.bar-w{display:flex;align-items:center;gap:4px;justify-content:center}
.bar-bg{width:55px;height:5px;background:#E2E8F0;border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px}
.chart-wrap{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:1rem;margin-bottom:1rem}
.chart-tabs{display:flex;gap:5px;margin-bottom:.8rem;flex-wrap:wrap}
.ct{padding:4px 10px;border-radius:6px;border:1px solid #CBD5E1;background:#F8FAFC;cursor:pointer;font-size:11px;color:#64748B}
.ct.active{background:#07689F;color:#fff;border-color:#07689F}
.loja-card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;margin-bottom:.5rem;overflow:hidden}
.loja-hdr{padding:.65rem .9rem;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.loja-hdr:hover{background:#F8FAFC}
.loja-nm{font-weight:600;font-size:13px;flex:1}
.loja-ts{font-size:10px;color:#94A3B8}
.loja-body{display:none;padding:.75rem;border-top:1px solid #F1F5F9}
.loja-body.open{display:block}
.sec-titulo{font-size:11px;font-weight:700;color:#07689F;text-transform:uppercase;letter-spacing:.5px;margin:.8rem 0 .4rem;padding-left:4px;border-left:3px solid #07689F}
.dk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:5px;margin-bottom:.4rem}
.dk{background:#F8FAFC;border-radius:8px;padding:.5rem .65rem;border:1px solid #E2E8F0}
.dk-l{font-size:10px;color:#94A3B8;text-transform:uppercase;letter-spacing:.3px}
.dk-v{font-size:14px;font-weight:600;margin-top:2px}
</style>
</head>

<script>
var API="https://script.google.com/macros/s/AKfycbwYhfCAVxEzVI3rhJFAyB1W5t4toUZNJG383oK4Lfgik2-4VEYah-chePyZeAh_upkDqw/exec";
var LOJAS=[{"id": "izaac", "nome": "Isaac"}, {"id": "aguaverde", "nome": "Agua Verde"}, {"id": "uberaba", "nome": "Uberaba"}, {"id": "campolargo", "nome": "Campo Largo"}, {"id": "capaoRaSo", "nome": "Capao Raso"}, {"id": "saojose", "nome": "Sao Jose"}, {"id": "expressa", "nome": "Expressa"}, {"id": "fazenda", "nome": "Fazenda"}, {"id": "colombo", "nome": "Colombo"}, {"id": "araucaria", "nome": "Araucaria"}, {"id": "central", "nome": "Central"}];
var metrica="geral";
var chartTipo="notas";
var dadosLojas={};
var myChart=null;

function gv(d,k){ if(d&&d[k]&&d[k].a!==undefined)return Number(d[k].a)||0; return 0; }
function sG(d){ return (gv(d,"google_nota")/5)*50+Math.min(gv(d,"google_positivas")/200,1)*35+(1-Math.min(gv(d,"google_negativas")/20,1))*15; }
function sI(d){ return (gv(d,"ifood_nota")/5)*50+Math.min(gv(d,"ifood_avaliacoes")/300,1)*35+(1-Math.min(gv(d,"ifood_cancelamentos")/30,1))*15; }
function sL(d){ return (gv(d,"leads_nota")/5)*50+Math.min(gv(d,"leads_positivas")/20,1)*30+Math.min(gv(d,"leads_respostas")/20,1)*20; }
function sST(d){ return Math.min(gv(d,"start_abertura")/27,1)*60+Math.min(gv(d,"start_fechamento")/27,1)*40; }
function sPR(d){ return Math.min(gv(d,"prod_buffet")/3000,1)*60+Math.min(gv(d,"prod_chopp")/300,1)*25+Math.min(gv(d,"prod_sobremesas")/100,1)*15; }
function sGer(d){ return sG(d)+sI(d)+sL(d)+sST(d)*0.5+sPR(d)*0.5; }
function getScore(r){ if(metrica==="google")return r.sg; if(metrica==="ifood")return r.si; if(metrica==="leads")return r.sl; if(metrica==="start")return r.ss; if(metrica==="prod")return r.sp; return r.sger; }

function carregar(){
  var ts=document.getElementById('tsMsg');
  ts.textContent='Atualizando...';
  var old=document.getElementById('jscript');
  if(old)old.remove();
  window.receberDados=function(data){
    if(data&&data.status==='ok'){dadosLojas=data.lojas||{};}
    renderDash();
    ts.textContent='Atualizado: '+new Date().toLocaleString('pt-BR');
  };
  var s=document.createElement('script');
  s.id='jscript';
  s.src=API+'?callback=receberDados&t='+Date.now();
  s.onerror=function(){ts.textContent='Erro de conexao';renderDash();};
  document.head.appendChild(s);
}

function setM(m,el){
  metrica=m;
  document.querySelectorAll('.mf').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderDash();
}

function setChart(t,el){
  chartTipo=t;
  document.querySelectorAll('.ct').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderChart(buildScored());
}

function togBody(el){el.nextElementSibling.classList.toggle('open');}

function dk(label,val,color){
  var v=(val===0||val===undefined||val===null)?'--':val;
  var style=color?' style="color:'+color+'"':'';
  return '<div class="dk"><div class="dk-l">'+label+'</div><div class="dk-v"'+style+'>'+v+'</div></div>';
}

function cn(v){ return v>=4.7?'good':v>=4.3?'warn':'bad'; }

function buildScored(){
  var scored=[];
  for(var i=0;i<LOJAS.length;i++){
    var l=LOJAS[i];
    var ld=dadosLojas[l.id]||{};
    var d=ld.dados||{};
    scored.push({id:l.id,nome:l.nome,d:d,ts:ld.ts||'',
      sg:sG(d),si:sI(d),sl:sL(d),ss:sST(d),sp:sPR(d),sger:sGer(d),
      gn:gv(d,"google_nota"),gp:gv(d,"google_positivas"),gng:gv(d,"google_negativas"),
      iv:gv(d,"ifood_nota"),ia:gv(d,"ifood_avaliacoes"),ic:gv(d,"ifood_cancelamentos"),ich:gv(d,"ifood_chamados"),
      ln:gv(d,"leads_nota"),lp:gv(d,"leads_positivas"),lneg:gv(d,"leads_negativas"),lr:gv(d,"leads_respostas"),
      bf:gv(d,"prod_buffet"),bch:gv(d,"prod_chopp"),bsb:gv(d,"prod_sobremesas"),
      cmv:gv(d,"cmv"),hc:gv(d,"hc_qtd"),hcc:gv(d,"hc_custo"),
      rec:gv(d,"rec_reclamacoes"),rl:gv(d,"rec_ligacoes"),
      rha:gv(d,"rh_atrasos"),rhadv:gv(d,"rh_advertencias"),rhf:gv(d,"rh_folhas"),
      sta:gv(d,"start_abertura"),stf:gv(d,"start_fechamento"),
      clm:gv(d,"cliente_mulheres"),clh:gv(d,"cliente_homens"),
      pe:gv(d,"parc_escolas"),pi:gv(d,"parc_igrejas"),pc:gv(d,"parc_comercio"),
      chf:gv(d,"check_fabio"),cha:gv(d,"check_abertura"),chfe:gv(d,"check_fechamento"),
      vc:gv(d,"video_clientes"),vcol:gv(d,"video_colaboradores"),vp:gv(d,"video_produtos"),
      vr:gv(d,"video_reuniao"),vcu:gv(d,"video_curiosidades")
    });
  }
  scored.sort(function(a,b){return getScore(b)-getScore(a);});
  return scored;
}

function renderChart(scored){
  var ctx=document.getElementById('myChart').getContext('2d');
  if(myChart){myChart.destroy();}
  var labels=scored.map(function(r){return r.nome;});
  var datasets=[];
  if(chartTipo==='notas'){
    datasets=[
      {label:'Google',data:scored.map(function(r){return r.gn;}),backgroundColor:'rgba(66,133,244,0.8)',borderColor:'#4285F4',borderWidth:1},
      {label:'iFood',data:scored.map(function(r){return r.iv;}),backgroundColor:'rgba(234,29,44,0.8)',borderColor:'#EA1D2C',borderWidth:1},
      {label:'Leads',data:scored.map(function(r){return r.ln;}),backgroundColor:'rgba(249,115,22,0.8)',borderColor:'#F97316',borderWidth:1}
    ];
  } else if(chartTipo==='volume'){
    datasets=[
      {label:'Aval. Google',data:scored.map(function(r){return r.gp;}),backgroundColor:'rgba(66,133,244,0.8)',borderColor:'#4285F4',borderWidth:1},
      {label:'Aval. iFood',data:scored.map(function(r){return r.ia;}),backgroundColor:'rgba(234,29,44,0.8)',borderColor:'#EA1D2C',borderWidth:1}
    ];
  } else if(chartTipo==='prod'){
    datasets=[
      {label:'Buffet',data:scored.map(function(r){return r.bf;}),backgroundColor:'rgba(16,185,129,0.8)',borderColor:'#10B981',borderWidth:1},
      {label:'Chopp',data:scored.map(function(r){return r.bch;}),backgroundColor:'rgba(139,92,246,0.8)',borderColor:'#8B5CF6',borderWidth:1},
      {label:'Sobremesas',data:scored.map(function(r){return r.bsb;}),backgroundColor:'rgba(245,158,11,0.8)',borderColor:'#F59E0B',borderWidth:1}
    ];
  } else {
    datasets=[{
      label:'Score Geral',
      data:scored.map(function(r){return Math.round(r.sger);}),
      backgroundColor:scored.map(function(r,i){return i===0?'rgba(255,215,0,0.9)':i===1?'rgba(192,192,192,0.9)':i===2?'rgba(205,127,50,0.9)':'rgba(30,39,97,0.7)';}),
      borderColor:'#1E2761',borderWidth:1
    }];
  }
  myChart=new Chart(ctx,{
    type:'bar',
    data:{labels:labels,datasets:datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11}}},tooltip:{mode:'index',intersect:false}},
      scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,0.05)'}}}
    }
  });
}

function renderDash(){
  var scored=buildScored();
  var maxSc=1;
  for(var i=0;i<scored.length;i++){if(getScore(scored[i])>maxSc)maxSc=getScore(scored[i]);}
  var wG=0,wI=0,wL=0,sumG=0,sumI=0,sumL=0,totBf=0,totGp=0,totIa=0;
  for(var i=0;i<scored.length;i++){
    var r=scored[i];
    if(r.gn>0){wG++;sumG+=r.gn;} if(r.iv>0){wI++;sumI+=r.iv;} if(r.ln>0){wL++;sumL+=r.ln;}
    totBf+=r.bf; totGp+=r.gp; totIa+=r.ia;
  }
  var avgG=wG?sumG/wG:0,avgI=wI?sumI/wI:0,avgL=wL?sumL/wL:0;
  var nSalvas=Object.keys(dadosLojas).length;

  document.getElementById('kpiRow').innerHTML=
    '<div class="kpi"><div class="kpi-v nota-g">'+avgG.toFixed(1)+'</div><div class="kpi-l">Media Google</div></div>'+
    '<div class="kpi"><div class="kpi-v nota-i">'+avgI.toFixed(1)+'</div><div class="kpi-l">Media iFood</div></div>'+
    '<div class="kpi"><div class="kpi-v nota-l">'+avgL.toFixed(1)+'</div><div class="kpi-l">Media Leads</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:#1E2761">'+totGp+'</div><div class="kpi-l">Aval. Google</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:#EA1D2C">'+totIa+'</div><div class="kpi-l">Aval. iFood</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:#10B981">'+totBf+'</div><div class="kpi-l">Buffet total</div></div>'+
    '<div class="kpi"><div class="kpi-v" style="color:#8B5CF6">'+nSalvas+'/'+LOJAS.length+'</div><div class="kpi-l">Lojas enviaram</div></div>';

  var rows='';
  for(var i=0;i<scored.length;i++){
    var r=scored[i];
    var sc=getScore(r),pct=Math.round(sc/maxSc*100);
    var col=pct>=70?"#22c55e":pct>=40?"#f59e0b":"#ef4444";
    var bc=i===0?"b1":i===1?"b2":i===2?"b3":"bn";
    var trCl=i===0?"top1":i===1?"top2":i===2?"top3":"";
    var sem=!dadosLojas[r.id];
    rows+='<tr class="'+trCl+'">'+
      '<td><span class="badge '+bc+'">'+(i+1)+'</span></td>'+
      '<td>'+r.nome+(sem?' <span style="font-size:9px;color:#94A3B8">(ag.)</span>':'')+'</td>'+
      '<td><span class="'+(r.gn>0?cn(r.gn):'')+'">'+(r.gn>0?r.gn.toFixed(1):'--')+'</span></td>'+
      '<td>'+r.gp+'</td><td>'+r.gng+'</td>'+
      '<td><span class="'+(r.iv>0?cn(r.iv):'')+'">'+(r.iv>0?r.iv.toFixed(1):'--')+'</span></td>'+
      '<td>'+r.ia+'</td><td>'+r.ic+'</td><td>'+r.ich+'</td>'+
      '<td><span class="'+(r.ln>0?cn(r.ln):'')+'">'+(r.ln>0?r.ln.toFixed(1):'--')+'</span></td>'+
      '<td>'+r.lp+'</td><td>'+r.lr+'</td>'+
      '<td>'+r.hc+'</td><td>'+(r.cmv>0?r.cmv.toFixed(1)+'%':'--')+'</td>'+
      '<td>'+(r.rec>0?'<span class="bad">'+r.rec+'</span>':'0')+'</td>'+
      '<td>'+r.sta+'</td>'+
      '<td>'+(r.pe+r.pi+r.pc)+'</td>'+
      '<td>'+r.chf+'</td>'+
      '<td>'+r.bf+'</td><td>'+r.bch+'</td>'+
      '<td><div class="bar-w"><div class="bar-bg"><div class="bar-f" style="width:'+pct+'%;background:'+col+'"></div></div> '+Math.round(sc)+'</div></td>'+
      '</tr>';
  }
  document.getElementById('rankTable').innerHTML=
    '<table><thead>'+
    '<tr>'+
    '<th rowspan="2">#</th><th rowspan="2">Loja</th>'+
    '<th colspan="3" style="background:#2563EB">Google</th>'+
    '<th colspan="4" style="background:#DC2626">iFood</th>'+
    '<th colspan="3" style="background:#EA580C">Leads</th>'+
    '<th colspan="2" style="background:#059669">HC/CMV</th>'+
    '<th rowspan="2" style="background:#991B1B">Reclam.</th>'+
    '<th rowspan="2" style="background:#6D28D9">Start</th>'+
    '<th rowspan="2" style="background:#0F766E">Parcer.</th>'+
    '<th rowspan="2" style="background:#1D4ED8">Check</th>'+
    '<th colspan="2" style="background:#15803D">Produtos</th>'+
    '<th rowspan="2" style="background:#1E2761">Score</th>'+
    '</tr><tr>'+
    '<th>Nota</th><th>Pos.</th><th>Neg.</th>'+
    '<th>Nota</th><th>Aval.</th><th>Canc.</th><th>Cham.</th>'+
    '<th>Nota</th><th>Pos.</th><th>Resp.</th>'+
    '<th>Pess.</th><th>CMV</th>'+
    '<th>Buffet</th><th>Chopp</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>';

  renderChart(scored);

  var details='';
  for(var i=0;i<scored.length;i++){
    var r=scored[i];
    var sem=!dadosLojas[r.id];
    var corpo=sem?'<p style="color:#94A3B8;font-size:12px;padding:.5rem">Gerente ainda nao enviou dados.</p>':
      '<div class="sec-titulo">Avaliacoes Google</div><div class="dk-grid">'+
      dk('Nota',r.gn>0?r.gn.toFixed(1):0,'#4285F4')+dk('Positivas',r.gp)+dk('Negativas',r.gng)+dk('Score',Math.round(r.sg)+'pts')+'</div>'+
      '<div class="sec-titulo">iFood</div><div class="dk-grid">'+
      dk('Nota',r.iv>0?r.iv.toFixed(1):0,'#EA1D2C')+dk('Avaliacoes',r.ia)+dk('Chamados',r.ich)+dk('Cancelamentos',r.ic)+dk('Score',Math.round(r.si)+'pts')+'</div>'+
      '<div class="sec-titulo">Headcount e CMV</div><div class="dk-grid">'+
      dk('Qtd. Pessoas',r.hc)+dk('Custo (R$)',r.hcc)+dk('CMV',r.cmv>0?r.cmv.toFixed(1)+'%':0)+'</div>'+
      '<div class="sec-titulo">Reclamacoes e RH</div><div class="dk-grid">'+
      dk('Reclamacoes',r.rec)+dk('Ligacoes Central',r.rl)+dk('Atrasos Docs',r.rha)+dk('Advertencias',r.rhadv)+dk('Folhas Ponto',r.rhf)+'</div>'+
      '<div class="sec-titulo">Leads Food</div><div class="dk-grid">'+
      dk('Nota',r.ln>0?r.ln.toFixed(1):0,'#F97316')+dk('Positivas',r.lp)+dk('Negativas',r.lneg)+dk('Respostas',r.lr)+dk('Score',Math.round(r.sl)+'pts')+'</div>'+
      '<div class="sec-titulo">Start Dina e Clientes e Parcerias</div><div class="dk-grid">'+
      dk('Abertura Turno',r.sta)+dk('Fechamento Turno',r.stf)+dk('Clientes Mulheres',r.clm)+dk('Clientes Homens',r.clh)+
      dk('Escolas',r.pe)+dk('Igrejas',r.pi)+dk('Comercio',r.pc)+'</div>'+
      '<div class="sec-titulo">Checklist e Videos e Produtos</div><div class="dk-grid">'+
      dk('Check Fabio',r.chf)+dk('Check Abertura',r.cha)+dk('Check Fechamento',r.chfe)+
      dk('Videos Clientes',r.vc)+dk('Videos Colab.',r.vcol)+dk('Videos Produtos',r.vp)+
      dk('Videos Reuniao',r.vr)+dk('Videos Curios.',r.vcu)+
      dk('Buffet',r.bf)+dk('Chopp',r.bch)+dk('Sobremesas',r.bsb)+
      dk('Score Geral',Math.round(r.sger)+'pts','#1E2761')+'</div>';

    details+='<div class="loja-card">'+
      '<div class="loja-hdr" onclick="togBody(this)">'+
      '<div class="loja-nm">'+(i+1)+'. '+r.nome+'</div>'+
      (sem?'<span style="font-size:11px;color:#94A3B8">Aguardando dados</span>':
        '<span class="nota-g">'+(r.gn>0?r.gn.toFixed(1):'--')+'</span> | '+
        '<span class="nota-i">'+(r.iv>0?r.iv.toFixed(1):'--')+'</span> | '+
        '<span class="nota-l">'+(r.ln>0?r.ln.toFixed(1):'--')+'</span>'+
        ' <span class="loja-ts">'+r.ts+'</span>')+
      ' <span style="color:#94A3B8">v</span></div>'+
      '<div class="loja-body">'+corpo+'</div></div>';
  }
  document.getElementById('lojaDetails').innerHTML=details;
}

carregar();
setInterval(carregar,60000);
</script>
